<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>웨이팅 리스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #080814;
      --bg2: #10102a;
      --card: #181830;
      --card2: #20203a;
      --red: #e63946;
      --gold: #ffd60a;
      --teal: #4cc9f0;
      --green: #06d6a0;
      --muted: #6b7280;
      --sub: #9ca3af;
      --text: #f3f4f6;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --r: 12px;
      --tr: all 0.22s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      user-select: none;
    }

    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: linear-gradient(135deg, #1a0a30, #0a1020);
      border-bottom: 1px solid var(--border2);
      flex-shrink: 0;
      position: relative;
    }

    .hd-left {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .hd-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--red), #c0392b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .hd-title {
      font-size: 20px;
      font-weight: 700;
    }

    .hd-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .hd-stats {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-v {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }

    .stat-l {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .hd-right {
      text-align: right;
    }

    .hd-time {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .hd-date {
      font-size: 11px;
      color: var(--muted);
    }

    .staff-tap {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 40px;
      height: 20px;
      cursor: pointer;
      opacity: 0;
    }

    /* VIEWS */
    .view {
      display: none;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
    }

    .view.active {
      display: flex;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: var(--tr);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab.on {
      color: var(--teal);
      border-bottom-color: var(--teal);
    }

    .tab i {
      font-size: 16px;
    }

    /* PANELS */
    .panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .panel.on {
      display: flex;
    }

    /* FORM */
    .form-box {
      width: 100%;
      max-width: 460px;
    }

    .form-h {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .form-hint {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .fg {
      margin-bottom: 18px;
    }

    .fl {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .fi {
      width: 100%;
      padding: 14px 18px;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 18px;
      font-weight: 500;
      outline: none;
      transition: var(--tr);
    }

    .fi:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.15);
    }

    .fi::placeholder {
      color: var(--muted);
    }

    /* PARTY BUTTONS */
    .party-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .pbtn {
      padding: 12px 4px;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
    }

    .pbtn.on,
    .pbtn:active {
      background: var(--teal);
      border-color: var(--teal);
      color: #080814;
    }

    /* PHONE NUMPAD */
    .phone-disp {
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      padding: 14px 18px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
      min-height: 64px;
      display: flex;
      align-items: center;
      font-variant-numeric: tabular-nums;
    }

    .phone-disp.empty {
      color: var(--muted);
      font-size: 16px;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .nkey {
      padding: 16px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      text-align: center;
    }

    .nkey:active {
      background: var(--card2);
      transform: scale(0.95);
    }

    .nkey.del {
      color: var(--red);
    }

    .nkey.clr {
      font-size: 13px;
      color: var(--muted);
    }

    /* PRIMARY BUTTON */
    .btn-p {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--r);
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-p.red {
      background: linear-gradient(135deg, var(--red), #c0392b);
    }

    .btn-p.teal {
      background: linear-gradient(135deg, var(--teal), #0077b6);
    }

    .btn-p:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* CHECK RESULT */
    .chk-result {
      margin-top: 20px;
      padding: 24px;
      background: var(--card);
      border-radius: var(--r);
      text-align: center;
      display: none;
    }

    .chk-result.on {
      display: block;
    }

    .pos-num {
      font-size: 72px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }

    .pos-lbl {
      font-size: 16px;
      color: var(--muted);
      margin-top: 6px;
    }

    .pos-wait {
      font-size: 20px;
      font-weight: 700;
      color: var(--teal);
      margin-top: 14px;
    }

    .pos-status {
      font-size: 15px;
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 100px;
      display: inline-block;
    }

    .pos-status.called {
      background: rgba(255, 214, 10, 0.2);
      color: var(--gold);
    }

    .pos-status.waiting {
      background: rgba(76, 201, 240, 0.15);
      color: var(--teal);
    }

    .not-found {
      color: var(--red);
      text-align: center;
      padding: 20px;
      font-size: 15px;
    }

    /* STAFF TOOLBAR */
    .staff-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .staff-bar-l {
      display: flex;
      gap: 8px;
      flex: 1;
      flex-wrap: wrap;
    }

    .sbtn {
      padding: 10px 18px;
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .sbtn:active {
      transform: scale(0.96);
    }

    .sbtn.red {
      background: linear-gradient(135deg, var(--red), #c0392b);
      border-color: transparent;
    }

    .sbtn.exit {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    /* TABLE */
    .tbl-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 7px;
    }

    thead th {
      padding: 8px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody tr {
      background: var(--card);
      transition: var(--tr);
    }

    tbody tr:hover {
      background: var(--card2);
    }

    tbody tr.called-row {
      background: rgba(255, 214, 10, 0.1);
    }

    tbody td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    tbody td:first-child {
      border-radius: 10px 0 0 10px;
    }

    tbody td:last-child {
      border-radius: 0 10px 10px 0;
    }

    .qnum {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .called-row .qnum {
      background: var(--gold);
      color: #080814;
    }

    .c-name {
      font-size: 16px;
      font-weight: 700;
    }

    .c-phone {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .party-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.07);
      padding: 5px 10px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
    }

    .wait-badge {
      font-size: 13px;
      color: var(--sub);
      font-variant-numeric: tabular-nums;
    }

    .sbadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
    }

    .sbadge.waiting {
      background: rgba(76, 201, 240, 0.15);
      color: var(--teal);
    }

    .sbadge.called {
      background: rgba(255, 214, 10, 0.2);
      color: var(--gold);
    }

    .sdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .sbadge.waiting .sdot {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .acts {
      display: flex;
      gap: 7px;
    }

    .btn-call {
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--gold), #f39c12);
      border: none;
      border-radius: var(--r);
      color: #080814;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-seat {
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--green), #059669);
      border: none;
      border-radius: var(--r);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-del {
      padding: 9px 13px;
      background: rgba(230, 57, 70, 0.12);
      border: 1.5px solid rgba(230, 57, 70, 0.3);
      border-radius: var(--r);
      color: var(--red);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: var(--tr);
    }

    .btn-call:active,
    .btn-seat:active,
    .btn-del:active {
      transform: scale(0.94);
    }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty i {
      font-size: 56px;
      opacity: 0.25;
      margin-bottom: 14px;
      display: block;
    }

    .empty p {
      font-size: 17px;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal.on {
      display: flex;
    }

    .mcard {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      animation: slideup 0.22s ease;
    }

    @keyframes slideup {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .mh {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mbtns {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .mcan {
      flex: 1;
      padding: 13px;
      background: transparent;
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--sub);
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
      transition: var(--tr);
    }

    .mok {
      flex: 2;
      padding: 13px;
      border: none;
      border-radius: var(--r);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
    }

    .mok.red {
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff;
    }

    .mok.green {
      background: linear-gradient(135deg, var(--green), #059669);
      color: #fff;
    }

    /* PIN */
    .pin-dots {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }

    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--border2);
      transition: var(--tr);
    }

    .pin-dot.filled {
      background: var(--teal);
    }

    .pin-numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .pkey {
      padding: 16px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      text-align: center;
    }

    .pkey:active {
      background: var(--card2);
      transform: scale(0.95);
    }

    .pkey.pdel {
      color: var(--red);
    }

    .pin-err {
      color: var(--red);
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }

    /* ADD CUSTOMER MODAL */
    .add-fi {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 17px;
      outline: none;
      transition: var(--tr);
      margin-bottom: 14px;
    }

    .add-fi:focus {
      border-color: var(--teal);
    }

    .add-fi::placeholder {
      color: var(--muted);
    }

    /* CALL MODAL */
    .call-phone {
      font-size: 36px;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      padding: 20px;
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
    }

    .call-name {
      text-align: center;
      color: var(--sub);
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* QR MODAL */
    .qr-wrap {
      text-align: center;
      padding: 10px 0;
    }

    .qr-wrap img {
      border-radius: 12px;
      max-width: 220px;
    }

    .qr-url {
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
      word-break: break-all;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
    }

    #toast.ok {
      background: var(--green);
      color: #080814;
    }

    #toast.err {
      background: var(--red);
      color: #fff;
    }

    #toast.info {
      background: var(--teal);
      color: #080814;
    }

    /* RESPONSIVE */
    @media(max-width:600px) {
      .hd-stats {
        gap: 12px;
      }

      .stat-v {
        font-size: 22px;
      }

      thead th {
        display: none;
      }

      tbody td {
        display: block;
      }

      tbody td:first-child {
        border-radius: 10px 10px 0 0;
      }

      tbody td:last-child {
        border-radius: 0 0 10px 10px;
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- HEADER -->
    <div id="header">
      <div class="hd-left">
        <div class="hd-icon">🍽️</div>
        <div>
          <div class="hd-title" id="rest-name">레스토랑</div>
          <div class="hd-sub">웨이팅 리스트</div>
        </div>
      </div>
      <div class="hd-stats">
        <div class="stat">
          <div class="stat-v" id="stat-total">0</div>
          <div class="stat-l">대기팀</div>
        </div>
        <div class="stat">
          <div class="stat-v" id="stat-wait">0분</div>
          <div class="stat-l">예상 대기</div>
        </div>
      </div>
      <div class="hd-right">
        <div class="hd-time" id="clock">--:--</div>
        <div class="hd-date" id="ddate">--</div>
      </div>
      <div class="staff-tap" id="staff-tap" title="직원 모드"></div>
    </div>

    <!-- CUSTOMER VIEW -->
    <div class="view active" id="customer-view">
      <div class="tabs">
        <button class="tab on" id="tab-reg" onclick="switchTab('reg')">
          <i class="fa-solid fa-plus-circle"></i> 대기 등록
        </button>
        <button class="tab" id="tab-chk" onclick="switchTab('chk')">
          <i class="fa-solid fa-magnifying-glass"></i> 순서 확인
        </button>
      </div>

      <!-- REGISTER PANEL -->
      <div class="panel on" id="panel-reg">
        <div class="form-box">
          <div class="form-h">대기 등록</div>
          <div class="form-hint">이름과 전화번호를 입력하고 대기 등록을 눌러주세요.</div>
          <div class="fg">
            <label class="fl">이름 (선택)</label>
            <input class="fi" type="text" id="reg-name" placeholder="예) 김철수" maxlength="20">
          </div>
          <div class="fg">
            <label class="fl">전화번호</label>
            <div class="phone-disp empty" id="reg-phone-disp">번호를 입력해 주세요</div>
            <div class="numpad" id="reg-numpad">

  <!-- TOAST -->
  <div id="toast"></div>

  <script>
    // ─────────────────────────────────────────────
    // ⚙️  FIREBASE 설정 (본인 프로젝트 값으로 교체)
    // README.md 파일을 참고하여 설정해 주세요.
    // ─────────────────────────────────────────────
    const FIREBASE_CONFIG = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // ─────────────────────────────────────────────
    // 앱 설정 (localStorage에서 로드)
    // ─────────────────────────────────────────────
    let CFG = {
      restaurantName: '레스토랑',
      staffPin: '1234',
      avgMin: 5
    };

    function loadCfg() {
      const s = localStorage.getItem('wl_cfg');
      if (s) try { CFG = { ...CFG, ...JSON.parse(s) }; } catch (e) { }
      document.getElementById('rest-name').textContent = CFG.restaurantName;
    }
    function saveCfg() {
      localStorage.setItem('wl_cfg', JSON.stringify(CFG));
      document.getElementById('rest-name').textContent = CFG.restaurantName;
    }

    // ─────────────────────────────────────────────
    // FIREBASE / LOCAL 모드
    // ─────────────────────────────────────────────
    let db = null;
    let useFirebase = false;
    let waitlist = []; // [{id, name, phone, partySize, addedAt, status}]

    function initFirebase() {
      if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
        useFirebase = false;
        loadLocalData();
        return;
      }
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.firestore();
        useFirebase = true;
        db.collection('waitlist')
          .orderBy('addedAt', 'asc')
          .onSnapshot(snap => {
            waitlist = snap.docs.map((doc, i) => ({
              id: doc.id,
              position: i + 1,
              ...doc.data(),
              addedAt: doc.data().addedAt ? doc.data().addedAt.toDate() : new Date()
            }));
            render();
          }, err => {
            console.error(err);
            useFirebase = false;
            loadLocalData();
          });
      } catch (e) {
        useFirebase = false;
        loadLocalData();
      }
    }

    function loadLocalData() {
      const s = localStorage.getItem('wl_data');
      if (s) try {
        waitlist = JSON.parse(s).map((w, i) => ({ ...w, position: i + 1, addedAt: new Date(w.addedAt) }));
      } catch (e) { waitlist = []; }
      render();
    }
    function saveLocal() {
      if (!useFirebase) {
        localStorage.setItem('wl_data', JSON.stringify(waitlist));
      }
    }

    // ─────────────────────────────────────────────
    // CRUD
    // ─────────────────────────────────────────────
    async function addCustomer(name, phone, partySize) {
      const norm = phone.replace(/\D/g, '');
      const dup = waitlist.find(w => w.phone.replace(/\D/g, '') === norm);
      if (dup) { toast(`이미 ${dup.position}번째로 대기 중입니다.`, 'err'); return false; }
      const data = {
        name: name || '손님',
        phone: norm,
        partySize: partySize,
        addedAt: useFirebase ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString(),
        status: 'waiting'
      };
      if (useFirebase) {
        await db.collection('waitlist').add(data);
      } else {
        waitlist.push({ ...data, id: Date.now().toString(), position: waitlist.length + 1, addedAt: new Date(data.addedAt) });
        saveLocal(); render();
      }
      return true;
    }

    async function removeCustomer(id) {
      if (useFirebase) {
        await db.collection('waitlist').doc(id).delete();
      } else {
        waitlist = waitlist.filter(w => w.id !== id).map((w, i) => ({ ...w, position: i + 1 }));
        saveLocal(); render();
      }
    }

    async function callCustomer(id) {
      const w = waitlist.find(x => x.id === id);
      const s = w?.status;
      const newStatus = s === 'called' ? 'waiting' : 'called';

      if (newStatus === 'called' && w) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(`${w.position}번 ${w.name || '손님'}, 입장해 주세요.`);
          u.lang = 'ko-KR';
          u.rate = 0.85;
          window.speechSynthesis.speak(u);
        }
      }

      if (useFirebase) {
        await db.collection('waitlist').doc(id).update({ status: newStatus });
      } else {
        waitlist = waitlist.map(w => w.id === id ? { ...w, status: newStatus } : w);
        saveLocal(); render();
      }
    }

    // ─────────────────────────────────────────────
    // PHONE INPUT STATE
    // ─────────────────────────────────────────────
    let regPhone = '';
    let chkPhone = '';
    let regParty = 1;
    let addParty = 1;

    function numpadInput(k, mode) {
      if (mode === 'reg') {
        if (k === 'del') regPhone = regPhone.slice(0, -1);
        else if (k === 'clear') regPhone = '';
        else if (regPhone.length < 11) regPhone += k;
        updatePhoneDisp('reg-phone-disp', regPhone);
      } else {
        if (k === 'del') chkPhone = chkPhone.slice(0, -1);
        else if (k === 'clear') chkPhone = '';
        else if (chkPhone.length < 11) chkPhone += k;
        updatePhoneDisp('chk-phone-disp', chkPhone);
      }
    }
    function updatePhoneDisp(id, val) {
      const el = document.getElementById(id);
      if (!val) { el.textContent = '번호를 입력해 주세요'; el.classList.add('empty'); return; }
      el.classList.remove('empty');
      // 010-xxxx-xxxx 형식
      let d = val;
      if (d.length > 3 && d.length <= 7) d = d.slice(0, 3) + '-' + d.slice(3);
      else if (d.length > 7) d = d.slice(0, 3) + '-' + d.slice(3, 7) + '-' + d.slice(7);
      el.textContent = d;
    }
    function selectParty(n) {
      regParty = n;
      document.querySelectorAll('#party-grid .pbtn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.n) === n));
    }
    function selectAddParty(n) {
      addParty = n;
      document.querySelectorAll('#add-party-grid .pbtn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.n) === n));
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      if (regPhone.length < 10) { toast('전화번호를 올바르게 입력해 주세요.', 'err'); return; }
      const ok = await addCustomer(name, regPhone, regParty);
      if (ok) {
        toast('대기 등록이 완료되었습니다! 🎉', 'ok');
        regPhone = ''; updatePhoneDisp('reg-phone-disp', '');
        document.getElementById('reg-name').value = '';
        regParty = 1; selectParty(1);
      }
    }

    function doCheck() {
      const norm = chkPhone.replace(/\D/g, '');
      if (norm.length < 10) { toast('전화번호를 입력해 주세요.', 'err'); return; }
      const found = waitlist.find(w => w.phone.replace(/\D/g, '') === norm);
      const res = document.getElementById('chk-result');
      res.classList.add('on');
      if (!found) {
        res.innerHTML = `<p class="not-found"><i class="fa-solid fa-circle-xmark" style="font-size:40px;display:block;margin-bottom:10px;"></i>등록된 번호를 찾을 수 없습니다.</p>`;
        return;
      }
      const waitMins = (found.position - 1) * CFG.avgMin;
      const statusHtml = found.status === 'called'
        ? `<span class="pos-status called"><i class="fa-solid fa-bell"></i> 지금 바로 입장 가능합니다!</span>`
        : `<span class="pos-status waiting"><i class="fa-solid fa-hourglass-half"></i> 대기 중</span>`;
      res.innerHTML = `
    <div class="pos-num">${found.position}</div>
    <div class="pos-lbl">현재 대기 순서 (전체 ${waitlist.length}팀)</div>
    <div class="pos-wait">예상 대기시간: 약 ${waitMins}분</div>
    ${statusHtml}
    <div style="margin-top:24px;border-top:1px solid var(--border2);padding-top:20px;">
      <button class="btn-p" style="background:transparent;border:1.5px solid var(--red);color:var(--red);padding:12px;font-size:14px;" onclick="cancelMyWait('${found.id}')">
        <i class="fa-solid fa-xmark"></i> 내 대기 취소하기
      </button>
    </div>
  `;
    }

    function cancelMyWait(id) {
      if (confirm("정말로 대기를 취소하시겠습니까?")) {
        removeCustomer(id);
        document.getElementById('chk-result').classList.remove('on');
        chkPhone = ''; updatePhoneDisp('chk-phone-disp', '');
        toast('대기가 취소되었습니다.', 'info');
      }
    }

    // ─────────────────────────────────────────────
    // TABS / VIEWS
    // ─────────────────────────────────────────────
    function switchTab(t) {
      ['reg', 'chk'].forEach(x => {
        document.getElementById('tab-' + x).classList.toggle('on', x === t);
        document.getElementById('panel-' + x).classList.toggle('on', x === t);
      });
      if (t === 'chk') { document.getElementById('chk-result').classList.remove('on'); }
    }

    // ─────────────────────────────────────────────
    // STAFF VIEW
    // ─────────────────────────────────────────────
    let pressTimer = null;
    const hdLeft = document.querySelector('.hd-left');

    function startPress() {
      pressTimer = setTimeout(() => {
        openPinModal();
      }, 1200);
    }
    function cancelPress() {
      clearTimeout(pressTimer);
    }

    hdLeft.addEventListener('touchstart', startPress, { passive: true });
    hdLeft.addEventListener('mousedown', startPress);
    hdLeft.addEventListener('touchend', cancelPress);
    hdLeft.addEventListener('mouseup', cancelPress);
    hdLeft.addEventListener('mouseleave', cancelPress);

    let tapCount = 0; let tapTimer = null;
    document.getElementById('staff-tap').addEventListener('click', () => {
      tapCount++;
      if (tapTimer) clearTimeout(tapTimer);
      if (tapCount >= 5) { tapCount = 0; openPinModal(); return; }
      tapTimer = setTimeout(() => tapCount = 0, 1500);
    });

    function exitStaff() {
      document.getElementById('staff-view').classList.remove('active');
      document.getElementById('customer-view').classList.add('active');
    }

    // ─────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────
    function render() {
      const tbody = document.getElementById('staff-tbody');
      const empty = document.getElementById('staff-empty');
      document.getElementById('stat-total').textContent = waitlist.length;
      document.getElementById('stat-wait').textContent = waitlist.length > 0 ? (waitlist.length * CFG.avgMin) + '분' : '0분';
      if (!waitlist.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      const now = Date.now();
      tbody.innerHTML = waitlist.map(w => {
        const elapsed = Math.floor((now - (w.addedAt?.getTime?.() ?? now)) / 60000);
        const phone = w.phone.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
        return `
    <tr class="${w.status === 'called' ? 'called-row' : ''}" id="row-${w.id}">
      <td><div class="qnum">${w.position}</div></td>
      <td>
        <div class="c-name">${esc(w.name)}</div>
        <div class="c-phone">${phone}</div>
      </td>
      <td><span class="party-badge"><i class="fa-solid fa-person" style="font-size:12px;"></i>${w.partySize}명</span></td>
      <td><span class="wait-badge">${elapsed}분 전</span></td>
      <td>
        <span class="sbadge ${w.status}">
          <span class="sdot"></span>
          ${w.status === 'called' ? '호출됨' : '대기중'}
        </span>
      </td>
      <td>
        <div class="acts">
          <button class="btn-call" onclick="openCallModal('${w.id}')">
            <i class="fa-solid fa-phone"></i> ${w.status === 'called' ? '재호출' : '호출'}
          </button>
          <button class="btn-seat" onclick="doSeat('${w.id}','${esc(w.name)}')" title="착석완료 및 삭제">
            <i class="fa-solid fa-check"></i> 착석
          </button>
          <button class="btn-del" onclick="openDelModal('${w.id}','${esc(w.name)}')" title="삭제">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        </div>
      </td>
    </tr>`;
      }).join('');
    }

    function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    // ─────────────────────────────────────────────
    // MODALS
    // ─────────────────────────────────────────────
    let pinVal = '';
    function openPinModal() {
      pinVal = '';
      updatePinDots();
      document.getElementById('pin-err').textContent = '';
      document.getElementById('pin-modal').classList.add('on');
    }
    function pinInput(k) {
      if (k === 'del') { pinVal = pinVal.slice(0, -1); }
      else if (pinVal.length < 4) { pinVal += k; }
      updatePinDots();
      if (pinVal.length === 4) {
        setTimeout(() => {
          if (pinVal === CFG.staffPin) {
            closeModal('pin-modal');
            document.getElementById('customer-view').classList.remove('active');
            document.getElementById('staff-view').classList.add('active');
            render();
          } else {
            document.getElementById('pin-err').textContent = 'PIN이 올바르지 않습니다.';
            pinVal = ''; updatePinDots();
          }
        }, 200);
      }
    }
    function updatePinDots() {
      for (let i = 0; i < 4; i++) document.getElementById('pd' + i).classList.toggle('filled', i < pinVal.length);
    }

    function openAddModal() {
      addParty = 1;
      document.getElementById('add-name').value = '';
      document.getElementById('add-phone').value = '';
      selectAddParty(1);
      document.getElementById('add-modal').classList.add('on');
    }
    async function confirmAdd() {
      const name = document.getElementById('add-name').value.trim();
      const phone = document.getElementById('add-phone').value.trim();
      if (phone.length < 10) { toast('전화번호를 올바르게 입력해 주세요.', 'err'); return; }
      const ok = await addCustomer(name, phone, addParty);
      if (ok) { closeModal('add-modal'); toast('등록되었습니다.', 'ok'); }
    }

    let currentCallId = null;
    function openCallModal(id) {
      currentCallId = id;
      const w = waitlist.find(x => x.id === id);
      if (!w) return;
      const phone = w.phone.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
      document.getElementById('call-name-txt').textContent = `${w.position}번 ${w.name} 손님 (${w.partySize}명)`;
      document.getElementById('call-phone-txt').textContent = phone;
      callCustomer(id);
      document.getElementById('call-modal').classList.add('on');
    }
    async function confirmSeat() {
      if (currentCallId) await removeCustomer(currentCallId);
      closeModal('call-modal');
      toast('착석 완료! 다음 손님 순서가 업데이트되었습니다.', 'ok');
    }

    async function doSeat(id, name) {
      await removeCustomer(id);
      toast(`${name} 손님 착석 완료.`, 'ok');
    }

    let delTargetId = null;
    function openDelModal(id, name) {
      delTargetId = id;
      document.getElementById('del-msg').textContent = `"${name}" 손님을 대기 목록에서 삭제하시겠습니까?`;
      document.getElementById('del-modal').classList.add('on');
    }
    async function confirmDelete() {
      if (delTargetId) { await removeCustomer(delTargetId); toast('삭제되었습니다.', 'info'); }
      closeModal('del-modal');
    }

    function openQrModal() {
      const url = encodeURIComponent(location.href.split('?')[0]);
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${url}`;
      document.getElementById('qr-wrap').innerHTML = `
    <img src="${qrUrl}" alt="QR Code">
    <div class="qr-url">${decodeURIComponent(url)}</div>
    <p style="color:var(--muted);font-size:13px;margin-top:8px;">손님이 스마트폰으로 스캔하면 순서를 확인할 수 있습니다.</p>
  `;
      document.getElementById('qr-modal').classList.add('on');
    }

    function openSettingsModal() {
      document.getElementById('set-name').value = CFG.restaurantName;
      document.getElementById('set-pin').value = CFG.staffPin;
      document.getElementById('set-avg').value = CFG.avgMin;
      document.getElementById('settings-modal').classList.add('on');
    }
    function saveSettings() {
      const name = document.getElementById('set-name').value.trim();
      const pin = document.getElementById('set-pin').value.trim();
      const avg = parseInt(document.getElementById('set-avg').value);
      if (pin && !/^\d{4}$/.test(pin)) { toast('PIN은 4자리 숫자여야 합니다.', 'err'); return; }
      if (name) CFG.restaurantName = name;
      if (pin) CFG.staffPin = pin;
      if (!isNaN(avg) && avg > 0) CFG.avgMin = avg;
      saveCfg(); render();
      closeModal('settings-modal');
      toast('설정이 저장되었습니다.', 'ok');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('on');
    }

    // ─────────────────────────────────────────────
    // TOAST
    // ─────────────────────────────────────────────
    let toastTimer;
    function toast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.className = '', 3000);
    }

    // ─────────────────────────────────────────────
    // CLOCK
    // ─────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hh}:${mm}`;
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      document.getElementById('ddate').textContent =
        `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
    }
    setInterval(updateClock, 1000);
    updateClock();
    // 대기시간 갱신 (1분마다)
    setInterval(() => { if (waitlist.length) render(); }, 60000);

    // ─────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────
    loadCfg();
    initFirebase();

    // URL ?staff 파라미터로 직원 화면 바로 접근 가능
    if (location.search.includes('staff')) openPinModal();

    // 화면 꺼짐 방지 (Wake Lock)
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (err) { }
    }
    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
    });
    requestWakeLock();
  </script>
</body>

</html>
