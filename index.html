<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>웨이팅 리스트</title>
  <meta name="theme-color" content="#10102a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #080814;
      --bg2: #10102a;
      --card: #181830;
      --card2: #20203a;
      --red: #e63946;
      --gold: #ffd60a;
      --teal: #4cc9f0;
      --green: #06d6a0;
      --muted: #6b7280;
      --sub: #9ca3af;
      --text: #f3f4f6;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --r: 12px;
      --tr: all 0.22s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      user-select: none;
    }

    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: linear-gradient(135deg, #1a0a30, #0a1020);
      border-bottom: 1px solid var(--border2);
      flex-shrink: 0;
      position: relative;
    }

    .hd-left {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .hd-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--red), #c0392b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .hd-title {
      font-size: 20px;
      font-weight: 700;
    }

    .hd-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .hd-stats {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-v {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }

    .stat-l {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .hd-right {
      text-align: right;
    }

    .hd-time {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .hd-date {
      font-size: 11px;
      color: var(--muted);
    }

    .staff-tap {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 40px;
      height: 20px;
      cursor: pointer;
      opacity: 0;
    }

    /* VIEWS */
    .view {
      display: none;
      flex: 1;
      overflow: hidden;
      flex-direction: row;
      /* 분할 화면을 위한 가로 배치 */
    }

    .view.active {
      display: flex;
    }

    /* STAFF VIEW SPECIFIC */
    #staff-view {
      flex-direction: column;
    }

    /* LEFT SIDE: REGISTRATION */
    .left-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg2);
    }

    /* RIGHT SIDE: STATUS/BOARD */
    .right-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* PANELS (Split Screen Use) */
    .panel {
      flex: 1;
      /* 전체 페이지 스크롤 복구 (모바일 등 작은 화면에서 짤림 방지) */
      overflow-y: auto;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* FORM */
    .form-box {
      width: 100%;
      height: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-h {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .form-hint {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .fg {
      margin-bottom: 12px;
    }

    .fl {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .fi {
      width: 100%;
      padding: 10px 12px;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      outline: none;
      transition: var(--tr);
    }

    .fi:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.15);
    }

    .fi::placeholder {
      color: var(--muted);
    }

    /* PARTY BUTTONS */
    .party-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .pbtn {
      padding: 12px 4px;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
    }

    .pbtn.on,
    .pbtn:active {
      background: var(--teal);
      border-color: var(--teal);
      color: #080814;
    }

    /* PHONE NUMPAD */
    .phone-disp {
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      padding: 8px 12px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-variant-numeric: tabular-nums;
    }

    .phone-disp.empty {
      color: var(--muted);
      font-size: 14px;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-top: 6px;
    }

    .nkey {
      padding: 10px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      text-align: center;
    }

    .nkey:active {
      background: var(--card2);
      transform: scale(0.95);
    }

    .nkey.del {
      color: var(--red);
    }

    .nkey.clr {
      font-size: 13px;
      color: var(--muted);
    }

    /* PRIMARY BUTTON */
    .btn-p {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--r);
      color: white;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-p.red {
      background: linear-gradient(135deg, var(--red), #c0392b);
    }

    .btn-p.teal {
      background: linear-gradient(135deg, var(--teal), #0077b6);
    }

    .btn-p:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* CHECK RESULT */
    .chk-result {
      margin-top: 20px;
      padding: 24px;
      background: var(--card);
      border-radius: var(--r);
      text-align: center;
      display: none;
    }

    .chk-result.on {
      display: block;
    }

    .pos-num {
      font-size: 72px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }

    .pos-lbl {
      font-size: 16px;
      color: var(--muted);
      margin-top: 6px;
    }

    .pos-wait {
      font-size: 20px;
      font-weight: 700;
      color: var(--teal);
      margin-top: 14px;
    }

    .pos-status {
      font-size: 15px;
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 100px;
      display: inline-block;
    }

    .pos-status.called {
      background: rgba(255, 214, 10, 0.2);
      color: var(--gold);
    }

    .pos-status.waiting {
      background: rgba(76, 201, 240, 0.15);
      color: var(--teal);
    }

    .not-found {
      color: var(--red);
      text-align: center;
      padding: 20px;
      font-size: 15px;
    }

    .list-board {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow: hidden;
    }

    .board-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .board-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 6px;
    }

    /* 슬림 스크롤바 (Webkit) */
    .board-list::-webkit-scrollbar {
      width: 5px;
    }

    .board-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 10px;
    }

    .board-item {
      background: var(--card);
      border-left: 4px solid var(--teal);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .board-item.called {
      border-left-color: var(--gold);
      background: rgba(255, 214, 10, 0.05);
    }

    .bi-num {
      font-size: 20px;
      font-weight: 900;
      color: var(--text);
      width: 40px;
      text-align: center;
    }

    .bi-info {
      flex: 1;
      padding-left: 8px;
    }

    .bi-phone {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .bi-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .bi-status {
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
    }

    .bi-status.waiting {
      background: rgba(76, 201, 240, 0.15);
      color: var(--teal);
    }

    .bi-status.called {
      background: rgba(255, 214, 10, 0.2);
      color: var(--gold);
      animation: pulse 1.5s infinite;
    }

    .btn-seat-small {
      padding: 4px 10px;
      background: rgba(6, 214, 160, 0.15);
      border: 1px solid rgba(6, 214, 160, 0.3);
      border-radius: 6px;
      color: var(--green);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
    }

    .btn-seat-small:active {
      transform: scale(0.95);
    }

    /* STAFF TOOLBAR */
    .staff-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .staff-bar-l {
      display: flex;
      gap: 8px;
      flex: 1;
      flex-wrap: wrap;
    }

    .sbtn {
      padding: 10px 18px;
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .sbtn:active {
      transform: scale(0.96);
    }

    .sbtn.red {
      background: linear-gradient(135deg, var(--red), #c0392b);
      border-color: transparent;
    }

    .sbtn.exit {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    /* TABLE */
    .tbl-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 7px;
    }

    thead th {
      padding: 8px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody tr {
      background: var(--card);
      transition: var(--tr);
    }

    tbody tr:hover {
      background: var(--card2);
    }

    tbody tr.called-row {
      background: rgba(255, 214, 10, 0.1);
    }

    tbody td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    tbody td:first-child {
      border-radius: 10px 0 0 10px;
    }

    tbody td:last-child {
      border-radius: 0 10px 10px 0;
    }

    .qnum {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .called-row .qnum {
      background: var(--gold);
      color: #080814;
    }

    .c-name {
      font-size: 16px;
      font-weight: 700;
    }

    .c-phone {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .party-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.07);
      padding: 5px 10px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
    }

    .wait-badge {
      font-size: 13px;
      color: var(--sub);
      font-variant-numeric: tabular-nums;
    }

    .sbadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
    }

    .sbadge.waiting {
      background: rgba(76, 201, 240, 0.15);
      color: var(--teal);
    }

    .sbadge.called {
      background: rgba(255, 214, 10, 0.2);
      color: var(--gold);
    }

    .sdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .sbadge.waiting .sdot {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .acts {
      display: flex;
      gap: 7px;
    }

    .btn-call {
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--gold), #f39c12);
      border: none;
      border-radius: var(--r);
      color: #080814;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-seat {
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--green), #059669);
      border: none;
      border-radius: var(--r);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-del {
      padding: 9px 13px;
      background: rgba(230, 57, 70, 0.12);
      border: 1.5px solid rgba(230, 57, 70, 0.3);
      border-radius: var(--r);
      color: var(--red);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: var(--tr);
    }

    .btn-call:active,
    .btn-seat:active,
    .btn-del:active {
      transform: scale(0.94);
    }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty i {
      font-size: 56px;
      opacity: 0.25;
      margin-bottom: 14px;
      display: block;
    }

    .empty p {
      font-size: 17px;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal.on {
      display: flex;
    }

    .mcard {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      animation: slideup 0.22s ease;
    }

    @keyframes slideup {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .mh {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mbtns {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .mcan {
      flex: 1;
      padding: 13px;
      background: transparent;
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--sub);
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
      transition: var(--tr);
    }

    .mok {
      flex: 2;
      padding: 13px;
      border: none;
      border-radius: var(--r);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
    }

    .mok.red {
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff;
    }

    .mok.green {
      background: linear-gradient(135deg, var(--green), #059669);
      color: #fff;
    }

    /* PIN */
    .pin-dots {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }

    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--border2);
      transition: var(--tr);
    }

    .pin-dot.filled {
      background: var(--teal);
    }

    .pin-numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .pkey {
      padding: 16px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      text-align: center;
    }

    .pkey:active {
      background: var(--card2);
      transform: scale(0.95);
    }

    .pkey.pdel {
      color: var(--red);
    }

    .pin-err {
      color: var(--red);
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }

    /* ADD CUSTOMER MODAL */
    .add-fi {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 17px;
      outline: none;
      transition: var(--tr);
      margin-bottom: 14px;
    }

    .add-fi:focus {
      border-color: var(--teal);
    }

    .add-fi::placeholder {
      color: var(--muted);
    }

    /* CALL MODAL */
    .call-phone {
      font-size: 36px;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      padding: 20px;
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
    }

    .call-name {
      text-align: center;
      color: var(--sub);
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* QR MODAL */
    .qr-wrap {
      text-align: center;
      padding: 10px 0;
    }

    .qr-wrap img {
      border-radius: 12px;
      max-width: 220px;
    }

    .qr-url {
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
      word-break: break-all;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
    }

    #toast.ok {
      background: var(--green);
      color: #080814;
    }

    #toast.err {
      background: var(--red);
      color: #fff;
    }

    #toast.info {
      background: var(--teal);
      color: #080814;
    }

    /* RESPONSIVE */
    @media(max-width:900px) {
      .view {
        flex-direction: column;
      }

      .left-side {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }

    @media(max-width:600px) {
      .hd-stats {
        gap: 12px;
      }

      .stat-v {
        font-size: 22px;
      }

      thead th {
        display: none;
      }

      tbody td {
        display: block;
      }

      tbody td:first-child {
        border-radius: 10px 10px 0 0;
      }

      tbody td:last-child {
        border-radius: 0 0 10px 10px;
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- HEADER -->
    <div id="header">
      <div class="hd-left">
        <div class="hd-icon">🍽️</div>
        <div>
          <div class="hd-title" id="rest-name">레스토랑</div>
          <div class="hd-sub">웨이팅 리스트</div>
        </div>
      </div>
      <div class="hd-stats">
        <div class="stat">
          <div class="stat-v" id="stat-total">0</div>
          <div class="stat-l">대기팀</div>
        </div>
        <div class="stat">
          <div class="stat-v" id="stat-wait">0분</div>
          <div class="stat-l">예상 대기</div>
        </div>
      </div>
      <div class="hd-right">
        <div class="hd-time" id="clock">--:--</div>
        <div class="hd-date" id="ddate">--</div>
      </div>
      <div class="staff-tap" id="staff-tap" title="직원 모드"></div>
    </div>

    <!-- CUSTOMER VIEW (Split Screen) -->
    <div class="view active" id="customer-view">

      <!-- LEFT SIDE: REGISTER -->
      <div class="left-side">
        <div class="panel">
          <div class="form-box">
            <div class="form-h">대기 등록</div>
            <div class="form-hint">전화번호를 입력하고 대기 등록을 눌러주세요.</div>
            <div class="fg">
              <label class="fl">전화번호</label>
              <div class="phone-disp empty" id="reg-phone-disp">번호를 입력해 주세요</div>
              <div class="numpad" id="reg-numpad">
                <button class="nkey" onclick="numpadInput('1','reg')">1</button>
                <button class="nkey" onclick="numpadInput('2','reg')">2</button>
                <button class="nkey" onclick="numpadInput('3','reg')">3</button>
                <button class="nkey" onclick="numpadInput('4','reg')">4</button>
                <button class="nkey" onclick="numpadInput('5','reg')">5</button>
                <button class="nkey" onclick="numpadInput('6','reg')">6</button>
                <button class="nkey" onclick="numpadInput('7','reg')">7</button>
                <button class="nkey" onclick="numpadInput('8','reg')">8</button>
                <button class="nkey" onclick="numpadInput('9','reg')">9</button>
                <button class="nkey clr" onclick="numpadInput('clear','reg')">전체삭제</button>
                <button class="nkey" onclick="numpadInput('0','reg')">0</button>
                <button class="nkey del" onclick="numpadInput('del','reg')"><i
                    class="fa-solid fa-delete-left"></i></button>
              </div>
            </div>
            <div class="fg">
              <label class="fl">인원</label>
              <div class="party-grid" id="party-grid">
                <button class="pbtn on" data-n="1" onclick="selectParty(1)">1명</button>
                <button class="pbtn" data-n="2" onclick="selectParty(2)">2명</button>
                <button class="pbtn" data-n="3" onclick="selectParty(3)">3명</button>
                <button class="pbtn" data-n="4" onclick="selectParty(4)">4명</button>
                <button class="pbtn" data-n="5" onclick="selectParty(5)">5명</button>
                <button class="pbtn" data-n="6" onclick="selectParty(6)">6+</button>
              </div>
            </div>
            <button class="btn-p red" onclick="doRegister()">
              <i class="fa-solid fa-ticket"></i> 대기 등록하기
            </button>
          </div>
        </div>
      </div>

      <!-- RIGHT SIDE: LIVE BOARD -->
      <div class="right-side">
        <div class="list-board">
          <div class="board-title">
            <i class="fa-solid fa-list-ol"></i> 현재 대기 현황
          </div>
          <div class="board-list" id="board-list-body">
            <!-- JS 렌더링 영역 -->
          </div>

          <div class="empty" id="board-empty" style="display:none; padding-top:40px;">
            <i class="fa-solid fa-mug-hot"></i>
            <p>바로 입장 가능합니다.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- STAFF VIEW -->
    <div class="view" id="staff-view">
      <div class="staff-bar">
        <div class="staff-bar-l">
          <button class="sbtn red" onclick="openAddModal()">
            <i class="fa-solid fa-user-plus"></i> 손님 추가
          </button>
          <button class="sbtn" onclick="openQrModal()">
            <i class="fa-solid fa-qrcode"></i> QR 코드
          </button>
          <button class="sbtn" onclick="openSettingsModal()">
            <i class="fa-solid fa-gear"></i> 설정
          </button>
        </div>
        <button class="sbtn exit" onclick="exitStaff()">
          <i class="fa-solid fa-door-open"></i> 손님 화면
        </button>
      </div>
      <div class="tbl-wrap">
        <table id="staff-table">
          <thead>
            <tr>
              <th>#</th>
              <th>전화번호</th>
              <th>인원</th>
              <th>대기시간</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="staff-tbody"></tbody>
        </table>
        <div class="empty" id="staff-empty" style="display:none;">
          <i class="fa-solid fa-chair"></i>
          <p>아직 대기 중인 손님이 없습니다.</p>
        </div>
      </div>
    </div>

    <!-- MODALS -->

    <!-- PIN MODAL -->
    <div class="modal" id="pin-modal">
      <div class="mcard">
        <div class="mh"><i class="fa-solid fa-lock" style="color:var(--gold)"></i> 직원 인증</div>
        <div class="pin-dots" id="pin-dots">
          <div class="pin-dot" id="pd0"></div>
          <div class="pin-dot" id="pd1"></div>
          <div class="pin-dot" id="pd2"></div>
          <div class="pin-dot" id="pd3"></div>
        </div>
        <div class="pin-numpad">
          <button class="pkey" onclick="pinInput('1')">1</button>
          <button class="pkey" onclick="pinInput('2')">2</button>
          <button class="pkey" onclick="pinInput('3')">3</button>
          <button class="pkey" onclick="pinInput('4')">4</button>
          <button class="pkey" onclick="pinInput('5')">5</button>
          <button class="pkey" onclick="pinInput('6')">6</button>
          <button class="pkey" onclick="pinInput('7')">7</button>
          <button class="pkey" onclick="pinInput('8')">8</button>
          <button class="pkey" onclick="pinInput('9')">9</button>
          <button class="pkey pdel" onclick="pinInput('del')"><i class="fa-solid fa-delete-left"></i></button>
          <button class="pkey" onclick="pinInput('0')">0</button>
          <button class="pkey" onclick="closeModal('pin-modal')" style="color:var(--muted);font-size:14px;">취소</button>
        </div>
        <div class="pin-err" id="pin-err"></div>
      </div>
    </div>

    <!-- ADD CUSTOMER MODAL (staff) -->
    <div class="modal" id="add-modal">
      <div class="mcard">
        <div class="mh"><i class="fa-solid fa-user-plus" style="color:var(--teal)"></i> 손님 추가</div>
        <input class="add-fi" type="tel" id="add-phone" placeholder="전화번호 (예: 01012345678)" maxlength="11">
        <label class="fl">인원</label>
        <div class="party-grid" style="margin-top:8px;margin-bottom:4px;" id="add-party-grid">
          <button class="pbtn on" data-n="1" onclick="selectAddParty(1)">1명</button>
          <button class="pbtn" data-n="2" onclick="selectAddParty(2)">2명</button>
          <button class="pbtn" data-n="3" onclick="selectAddParty(3)">3명</button>
          <button class="pbtn" data-n="4" onclick="selectAddParty(4)">4명</button>
          <button class="pbtn" data-n="5" onclick="selectAddParty(5)">5명</button>
          <button class="pbtn" data-n="6" onclick="selectAddParty(6)">6+</button>
        </div>
        <div class="mbtns">
          <button class="mcan" onclick="closeModal('add-modal')">취소</button>
          <button class="mok red" onclick="confirmAdd()"><i class="fa-solid fa-check"></i> 등록</button>
        </div>
      </div>
    </div>

    <!-- CALL MODAL -->
    <div class="modal" id="call-modal">
      <div class="mcard">
        <div class="mh"><i class="fa-solid fa-phone-volume" style="color:var(--gold)"></i> 손님 호출</div>
        <div class="call-name" id="call-name-txt"></div>
        <div class="call-phone" id="call-phone-txt"></div>
        <div class="mbtns">
          <button class="mcan" onclick="closeModal('call-modal')">닫기</button>
          <button class="mok green" onclick="confirmSeat()"><i class="fa-solid fa-chair"></i> 착석 완료</button>
        </div>
      </div>
    </div>

    <!-- QR MODAL -->
    <div class="modal" id="qr-modal">
      <div class="mcard">
        <div class="mh"><i class="fa-solid fa-qrcode" style="color:var(--teal)"></i> 손님용 QR 코드</div>
        <div class="qr-wrap" id="qr-wrap"></div>
        <div class="mbtns">
          <button class="mok teal" style="background:linear-gradient(135deg,var(--teal),#0077b6);color:#fff;flex:1;"
            onclick="closeModal('qr-modal')">확인</button>
        </div>
      </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal" id="settings-modal">
      <div class="mcard">
        <div class="mh"><i class="fa-solid fa-gear" style="color:var(--sub)"></i> 설정</div>
        <div class="fg">
          <label class="fl">레스토랑 이름</label>
          <input class="add-fi" type="text" id="set-name" placeholder="레스토랑 이름">
        </div>
        <div class="fg">
          <label class="fl">직원 PIN (4자리)</label>
          <input class="add-fi" type="password" id="set-pin" placeholder="4자리 숫자" maxlength="4">
        </div>
        <div class="fg">
          <label class="fl">팀당 평균 대기시간 (분)</label>
          <input class="add-fi" type="number" id="set-avg" min="1" max="60" placeholder="5">
        </div>
        <div class="mbtns">
          <button class="mcan" onclick="closeModal('settings-modal')">취소</button>
          <button class="mok red" onclick="saveSettings()"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
        </div>
      </div>
    </div>

    <!-- DELETE CONFIRM -->
    <div class="modal" id="del-modal">
      <div class="mcard">
        <div class="mh"><i class="fa-solid fa-trash" style="color:var(--red)"></i> 삭제 확인</div>
        <p style="color:var(--sub);font-size:15px;" id="del-msg"></p>
        <div class="mbtns">
          <button class="mcan" onclick="closeModal('del-modal')">취소</button>
          <button class="mok red" onclick="confirmDelete()">삭제</button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <script>
      // ─────────────────────────────────────────────
      // ⚙️  FIREBASE 설정 (본인 프로젝트 값으로 교체)
      // README.md 파일을 참고하여 설정해 주세요.
      // ─────────────────────────────────────────────
      const FIREBASE_CONFIG = {
        apiKey: "AIzaSyA7GKYNZY8qIayS9z4yfXShNLDhP1QZRpw",
        authDomain: "wating-list-b88f7.firebaseapp.com",
        projectId: "wating-list-b88f7",
        storageBucket: "wating-list-b88f7.firebasestorage.app",
        messagingSenderId: "1056218357032",
        appId: "1:1056218357032:web:dd2a95393bdd23aa92841d"
      };

      // ─────────────────────────────────────────────
      // 앱 설정 (localStorage에서 로드)
      // ─────────────────────────────────────────────
      let CFG = {
        restaurantName: '레스토랑',
        staffPin: '1234',
        avgMin: 5
      };

      function loadCfg() {
        const s = localStorage.getItem('wl_cfg');
        if (s) try { CFG = { ...CFG, ...JSON.parse(s) }; } catch (e) { }
        document.getElementById('rest-name').textContent = CFG.restaurantName;
      }
      function saveCfg() {
        localStorage.setItem('wl_cfg', JSON.stringify(CFG));
        document.getElementById('rest-name').textContent = CFG.restaurantName;
      }

      // ─────────────────────────────────────────────
      // FIREBASE / LOCAL 모드
      // ─────────────────────────────────────────────
      let db = null;
      let useFirebase = false;
      let waitlist = []; // [{id, name, phone, partySize, addedAt, status}]

      function initFirebase() {
        if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
          useFirebase = false;
          loadLocalData();
          return;
        }
        try {
          firebase.initializeApp(FIREBASE_CONFIG);
          db = firebase.firestore();
          useFirebase = true;
          db.collection('waitlist')
            .orderBy('addedAt', 'asc')
            .onSnapshot(snap => {
              waitlist = snap.docs.map((doc, i) => ({
                id: doc.id,
                position: i + 1,
                ...doc.data(),
                addedAt: doc.data().addedAt ? doc.data().addedAt.toDate() : new Date()
              }));
              render();
            }, err => {
              console.error(err);
              useFirebase = false;
              loadLocalData();
            });
        } catch (e) {
          useFirebase = false;
          loadLocalData();
        }
      }

      function loadLocalData() {
        const s = localStorage.getItem('wl_data');
        if (s) try {
          waitlist = JSON.parse(s).map((w, i) => ({ ...w, position: i + 1, addedAt: new Date(w.addedAt) }));
        } catch (e) { waitlist = []; }
        render();
      }
      function saveLocal() {
        if (!useFirebase) {
          localStorage.setItem('wl_data', JSON.stringify(waitlist));
        }
      }

      // ─────────────────────────────────────────────
      // CRUD
      // ─────────────────────────────────────────────
      async function addCustomer(name, phone, partySize) {
        const norm = phone.replace(/\D/g, '');
        const dup = waitlist.find(w => w.phone.replace(/\D/g, '') === norm);
        if (dup) { toast(`이미 ${dup.position}번째로 대기 중입니다.`, 'err'); return false; }
        const data = {
          name: name || '손님',
          phone: norm,
          partySize: partySize,
          addedAt: useFirebase ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString(),
          status: 'waiting'
        };
        if (useFirebase) {
          await db.collection('waitlist').add(data);
        } else {
          waitlist.push({ ...data, id: Date.now().toString(), position: waitlist.length + 1, addedAt: new Date(data.addedAt) });
          saveLocal(); render();
        }
        return true;
      }

      async function removeCustomer(id) {
        if (useFirebase) {
          await db.collection('waitlist').doc(id).delete();
        } else {
          waitlist = waitlist.filter(w => w.id !== id).map((w, i) => ({ ...w, position: i + 1 }));
          saveLocal(); render();
        }
      }

      async function callCustomer(id) {
        const w = waitlist.find(x => x.id === id);
        const s = w?.status;
        const newStatus = s === 'called' ? 'waiting' : 'called';

        if (newStatus === 'called' && w) {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(`${w.position}번 ${w.name || '손님'}, 입장해 주세요.`);
            u.lang = 'ko-KR';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
          }

          // [추가된 기능] URI scheme으로 SMS / iMessage 자동 완성 띄우기
          const msg = `[${CFG.restaurantName}] 많이 기다리셨습니다. 테이블이 준비되었습니다. 매장으로 입장해 주세요!`;
          const phoneNum = w.phone.replace(/-/g, ''); // 숫자만 남기기
          // 사용자 기기가 아이폰(iOS)일 경우 sms:번호&body= 방식, 안드로이드는 sms:번호?body= 방식 사용
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
          const sep = isIOS ? '&' : '?';

          window.location.href = `sms:${phoneNum}${sep}body=${encodeURIComponent(msg)}`;
        }

        if (useFirebase) {
          await db.collection('waitlist').doc(id).update({ status: newStatus });
        } else {
          waitlist = waitlist.map(w => w.id === id ? { ...w, status: newStatus } : w);
          saveLocal(); render();
        }
      }

      // ─────────────────────────────────────────────
      // PHONE INPUT STATE
      // ─────────────────────────────────────────────
      let regPhone = '';
      let chkPhone = '';
      let regParty = 1;
      let addParty = 1;

      function numpadInput(k, mode) {
        if (mode === 'reg') {
          if (k === 'del') regPhone = regPhone.slice(0, -1);
          else if (k === 'clear') regPhone = '';
          else if (regPhone.length < 11) regPhone += k;
          updatePhoneDisp('reg-phone-disp', regPhone);
        } else {
          if (k === 'del') chkPhone = chkPhone.slice(0, -1);
          else if (k === 'clear') chkPhone = '';
          else if (chkPhone.length < 11) chkPhone += k;
          updatePhoneDisp('chk-phone-disp', chkPhone);
        }
      }
      function updatePhoneDisp(id, val) {
        const el = document.getElementById(id);
        if (!val) { el.textContent = '번호를 입력해 주세요'; el.classList.add('empty'); return; }
        el.classList.remove('empty');
        // 010-xxxx-xxxx 형식
        let d = val;
        if (d.length > 3 && d.length <= 7) d = d.slice(0, 3) + '-' + d.slice(3);
        else if (d.length > 7) d = d.slice(0, 3) + '-' + d.slice(3, 7) + '-' + d.slice(7);
        el.textContent = d;
      }
      function selectParty(n) {
        regParty = n;
        document.querySelectorAll('#party-grid .pbtn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.n) === n));
      }
      function selectAddParty(n) {
        addParty = n;
        document.querySelectorAll('#add-party-grid .pbtn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.n) === n));
      }

      async function doRegister() {
        if (regPhone.length < 10) { toast('전화번호를 올바르게 입력해 주세요.', 'err'); return; }
        const ok = await addCustomer('', regPhone, regParty);
        if (ok) {
          toast('대기 등록이 완료되었습니다! 🎉', 'ok');
          regPhone = ''; updatePhoneDisp('reg-phone-disp', '');
          regParty = 1; selectParty(1);
        }
      }

      // ─────────────────────────────────────────────
      // STAFF VIEW
      // ─────────────────────────────────────────────
      let pressTimer = null;
      const hdLeft = document.querySelector('.hd-left');

      function startPress() {
        pressTimer = setTimeout(() => {
          openPinModal();
        }, 1200);
      }
      function cancelPress() {
        clearTimeout(pressTimer);
      }

      hdLeft.addEventListener('touchstart', startPress, { passive: true });
      hdLeft.addEventListener('mousedown', startPress);
      hdLeft.addEventListener('touchend', cancelPress);
      hdLeft.addEventListener('mouseup', cancelPress);
      hdLeft.addEventListener('mouseleave', cancelPress);

      let tapCount = 0; let tapTimer = null;
      document.getElementById('staff-tap').addEventListener('click', () => {
        tapCount++;
        if (tapTimer) clearTimeout(tapTimer);
        if (tapCount >= 5) { tapCount = 0; openPinModal(); return; }
        tapTimer = setTimeout(() => tapCount = 0, 1500);
      });

      function exitStaff() {
        document.getElementById('staff-view').classList.remove('active');
        document.getElementById('customer-view').classList.add('active');
      }

      // ─────────────────────────────────────────────
      // RENDER
      // ─────────────────────────────────────────────
      function render() {
        const tbody = document.getElementById('staff-tbody');
        const empty = document.getElementById('staff-empty');
        document.getElementById('stat-total').textContent = waitlist.length;
        document.getElementById('stat-wait').textContent = waitlist.length > 0 ? (waitlist.length * CFG.avgMin) + '분' : '0분';
        if (!waitlist.length) {
          tbody.innerHTML = '';
          empty.style.display = 'block';
          renderBoardLive();
          return;
        }
        empty.style.display = 'none';
        const now = Date.now();
        tbody.innerHTML = waitlist.map(w => {
          const elapsed = Math.floor((now - (w.addedAt?.getTime?.() ?? now)) / 60000);
          const phone = w.phone.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
          return `
    <tr class="${w.status === 'called' ? 'called-row' : ''}" id="row-${w.id}">
      <td><div class="qnum">${w.position}</div></td>
      <td>
        <div class="c-phone" style="font-size:16px; font-weight:700; color:var(--text);">${phone}</div>
      </td>
      <td><span class="party-badge"><i class="fa-solid fa-person" style="font-size:12px;"></i>${w.partySize}명</span></td>
      <td><span class="wait-badge">${elapsed}분 전</span></td>
      <td>
        <span class="sbadge ${w.status}">
          <span class="sdot"></span>
          ${w.status === 'called' ? '호출됨' : '대기중'}
        </span>
      </td>
      <td>
        <div class="acts">
          <button class="btn-call" onclick="openCallModal('${w.id}')">
            <i class="fa-solid fa-phone"></i> ${w.status === 'called' ? '재호출' : '호출'}
          </button>
          <button class="btn-seat" onclick="doSeat('${w.id}','${esc(w.name)}')" title="착석완료 및 삭제">
            <i class="fa-solid fa-check"></i> 착석
          </button>
          <button class="btn-del" onclick="openDelModal('${w.id}','${esc(w.name)}')" title="삭제">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        </div>
      </td>
    </tr>`;
        }).join('');

        renderBoardLive();
      }

      function renderBoardLive() {
        const bList = document.getElementById('board-list-body');
        const bEmpty = document.getElementById('board-empty');

        if (!waitlist.length) {
          bList.innerHTML = '';
          bEmpty.style.display = 'block';
          return;
        }

        bEmpty.style.display = 'none';

        bList.innerHTML = waitlist.map(w => {
          // 전화번호 뒷자리 마스킹 처리 010-92*1-8**5
          const raw = w.phone;
          let masked = '';
          if (raw.length === 11) {
            masked = raw.slice(0, 3) + '-' + raw.slice(3, 5) + '*' + raw.slice(6, 7) + '-' + raw.slice(7, 8) + '**' + raw.slice(10, 11);
          } else if (raw.length === 10) {
            masked = raw.slice(0, 3) + '-' + raw.slice(3, 4) + '*' + raw.slice(5, 6) + '-' + raw.slice(6, 7) + '**' + raw.slice(9, 10);
          } else {
            masked = raw;
          }

          const isCalled = w.status === 'called';
          const stText = isCalled ? '호출됨' : '대기중';
          const stClass = isCalled ? 'called' : 'waiting';

          return `
        <div class="board-item ${isCalled ? 'called' : ''}">
          <div class="bi-num">${w.position}</div>
          <div class="bi-info">
            <div class="bi-phone">${masked}</div>
            <div class="bi-sub">인원: ${w.partySize}명</div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
            <div class="bi-status ${stClass}">${stText}</div>
            <button class="btn-seat-small" onclick="doSeat('${w.id}','${masked}')">입장완료</button>
          </div>
        </div>
        `;
        }).join('');
      }

      function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

      // ─────────────────────────────────────────────
      // MODALS
      // ─────────────────────────────────────────────
      let pinVal = '';
      function openPinModal() {
        pinVal = '';
        updatePinDots();
        document.getElementById('pin-err').textContent = '';
        document.getElementById('pin-modal').classList.add('on');
      }
      function pinInput(k) {
        if (k === 'del') { pinVal = pinVal.slice(0, -1); }
        else if (pinVal.length < 4) { pinVal += k; }
        updatePinDots();
        if (pinVal.length === 4) {
          setTimeout(() => {
            if (pinVal === CFG.staffPin) {
              closeModal('pin-modal');
              document.getElementById('customer-view').classList.remove('active');
              document.getElementById('staff-view').classList.add('active');
              render();
            } else {
              document.getElementById('pin-err').textContent = 'PIN이 올바르지 않습니다.';
              pinVal = ''; updatePinDots();
            }
          }, 200);
        }
      }
      function updatePinDots() {
        for (let i = 0; i < 4; i++) document.getElementById('pd' + i).classList.toggle('filled', i < pinVal.length);
      }

      function openAddModal() {
        addParty = 1;
        document.getElementById('add-phone').value = '';
        selectAddParty(1);
        document.getElementById('add-modal').classList.add('on');
      }
      async function confirmAdd() {
        const phone = document.getElementById('add-phone').value.trim();
        if (phone.length < 10) { toast('전화번호를 올바르게 입력해 주세요.', 'err'); return; }
        const ok = await addCustomer('', phone, addParty);
        if (ok) { closeModal('add-modal'); toast('등록되었습니다.', 'ok'); }
      }

      let currentCallId = null;
      function openCallModal(id) {
        currentCallId = id;
        const w = waitlist.find(x => x.id === id);
        if (!w) return;
        const phone = w.phone.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
        document.getElementById('call-name-txt').textContent = `${w.position}번 ${w.name} 손님 (${w.partySize}명)`;
        document.getElementById('call-phone-txt').textContent = phone;
        callCustomer(id);
        document.getElementById('call-modal').classList.add('on');
      }
      async function confirmSeat() {
        if (currentCallId) await removeCustomer(currentCallId);
        closeModal('call-modal');
        toast('착석 완료! 다음 손님 순서가 업데이트되었습니다.', 'ok');
      }

      async function doSeat(id, name) {
        await removeCustomer(id);
        toast(`${name} 손님 착석 완료.`, 'ok');
      }

      let delTargetId = null;
      function openDelModal(id, name) {
        delTargetId = id;
        document.getElementById('del-msg').textContent = `"${name}" 손님을 대기 목록에서 삭제하시겠습니까?`;
        document.getElementById('del-modal').classList.add('on');
      }
      async function confirmDelete() {
        if (delTargetId) { await removeCustomer(delTargetId); toast('삭제되었습니다.', 'info'); }
        closeModal('del-modal');
      }

      function openQrModal() {
        const url = encodeURIComponent(location.href.split('?')[0]);
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${url}`;
        document.getElementById('qr-wrap').innerHTML = `
    <img src="${qrUrl}" alt="QR Code">
    <div class="qr-url">${decodeURIComponent(url)}</div>
    <p style="color:var(--muted);font-size:13px;margin-top:8px;">손님이 스마트폰으로 스캔하면 순서를 확인할 수 있습니다.</p>
  `;
        document.getElementById('qr-modal').classList.add('on');
      }

      function openSettingsModal() {
        document.getElementById('set-name').value = CFG.restaurantName;
        document.getElementById('set-pin').value = CFG.staffPin;
        document.getElementById('set-avg').value = CFG.avgMin;
        document.getElementById('settings-modal').classList.add('on');
      }
      function saveSettings() {
        const name = document.getElementById('set-name').value.trim();
        const pin = document.getElementById('set-pin').value.trim();
        const avg = parseInt(document.getElementById('set-avg').value);
        if (pin && !/^\d{4}$/.test(pin)) { toast('PIN은 4자리 숫자여야 합니다.', 'err'); return; }
        if (name) CFG.restaurantName = name;
        if (pin) CFG.staffPin = pin;
        if (!isNaN(avg) && avg > 0) CFG.avgMin = avg;
        saveCfg(); render();
        closeModal('settings-modal');
        toast('설정이 저장되었습니다.', 'ok');
      }

      function closeModal(id) {
        document.getElementById(id).classList.remove('on');
      }

      // ─────────────────────────────────────────────
      // TOAST
      // ─────────────────────────────────────────────
      let toastTimer;
      function toast(msg, type = 'info') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.className = '', 3000);
      }

      // ─────────────────────────────────────────────
      // CLOCK
      // ─────────────────────────────────────────────
      function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('clock').textContent = `${hh}:${mm}`;
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        document.getElementById('ddate').textContent =
          `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
      }
      setInterval(updateClock, 1000);
      updateClock();
      // 대기시간 갱신 (1분마다)
      setInterval(() => { if (waitlist.length) render(); }, 60000);

      // ─────────────────────────────────────────────
      // INIT
      // ─────────────────────────────────────────────
      loadCfg();
      initFirebase();

      // URL ?staff 파라미터로 직원 화면 바로 접근 가능
      if (location.search.includes('staff')) openPinModal();

      // 화면 꺼짐 방지 (Wake Lock)
      let wakeLock = null;
      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
          }
        } catch (err) { }
      }
      document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
      });
      requestWakeLock();

      // PWA Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('SW Registered!', reg);
          }).catch(err => console.log('SW Reg failed', err));
        });
      }
    </script>
</body>

</html>
